{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Grat – Your structured gym workout companion. Follow smart plans, track exercises, and reach your goals.">
    <title>Grat – Workout Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="{% static 'main/main.css' %}" rel="stylesheet">
    <link href="{% static 'main/styles.css' %}" rel="stylesheet">
  </head>
  <body>

    <!-- ── Navigation ─────────────────────────────────────── -->
    <nav class="site-nav">
      <a href="{% url 'main:index' %}" class="nav-brand">
        <span class="brand-dot"></span>
        Grat
      </a>
      <ul class="nav-links">
        <li><a href="{% url 'main:index' %}">Workout Plan</a></li>
        <li><a href="#">Calculator</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="{% url 'main:logout_view' %}" class="nav-logout">Logout</a></li>
      </ul>
    </nav>

    <!-- ── Page Content ─────────────────────────────────── -->
    <main class="page-wrapper">
      {% block body %}{% endblock %}
    </main>

    <!-- ── Scripts (deferred for performance) ───────────── -->
    <script src="{% static 'main/dynamic.js' %}" defer></script>
  </body>
</html>
